<!DOCTYPE html>
<html>
<head>
    <title>Test Images</title>
</head>
<body>
    <h1>Test Loading Images</h1>

    <h2>Day 1</h2>
    <img src="images/day 1/1.jpg" style="width: 200px;">

    <h2>Day 2</h2>
    <img src="images/Day 2/1.jpg" style="width: 200px;">

    <h2>Day 3</h2>
    <img src="images/Day 3/1.jpg" style="width: 200px;">

    <h2>Day 4</h2>
    <img src="images/Day 4/1.avif" style="width: 200px;">

    <h2>Day 5</h2>
    <img src="images/Day 5/1.jpg" style="width: 200px;">

    <h2>Day 6</h2>
    <img src="images/Day 6/1.jpg" style="width: 200px;">

    <script>
        // Log all images status
        const images = document.querySelectorAll('img');
        images.forEach((img, index) => {
            img.onload = () => console.log(`Image ${index + 1} loaded: ${img.src}`);
            img.onerror = () => console.error(`Image ${index + 1} failed: ${img.src}`);
        });
    </script>
</body>
</html>
